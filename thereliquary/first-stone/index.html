<!DOCTYPE html>

<title>The First Stone | BitPangea</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    background: #02050a;
    color: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(rgba(2,5,10,.82), rgba(2,5,10,.94));
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 75% 12%, rgba(0,200,215,.08), transparent 34%),
        radial-gradient(circle at 18% 18%, rgba(212,169,56,.08), transparent 32%);
    z-index: -1;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 120px 40px 100px;
    text-align: center;
}

.eyebrow {
    color: #00c8d7;
    text-transform: uppercase;
    letter-spacing: 4px;
    font-size: 11px;
    margin-bottom: 24px;
}

h1 {
    font-size: clamp(42px, 8vw, 84px);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 30px;
}

.divider {
    width: 80px;
    height: 2px;
    background: #d4a938;
    margin: 0 auto 50px;
}

.statement {
    font-size: 28px;
    line-height: 1.7;
    margin-bottom: 60px;
}

.image-wrap {
    margin: 0 auto 60px;
    max-width: 900px;
}

.image-wrap img {
    width: 100%;
    height: auto;
    border: 1px solid rgba(212,169,56,.20);
    box-shadow: 0 0 40px rgba(0,0,0,.50);
}

.date {
    color: #d4a938;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.day {
    color: rgba(255,255,255,.60);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-size: 12px;
}
</style>

</head>

<body>

<div class="container">
