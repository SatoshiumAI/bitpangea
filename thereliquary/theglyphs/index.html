    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #02050a;
      --gold: #d4a938;

      --white: #ffffff;
      --line: rgba(212, 169, 56, 0.18);

    html, body {

      min-height: 100%;
      background: var(--bg);

    }

    body {
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
      background: #000;
      line-height: 1.7;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 38%, rgba(212, 169, 56, 0.10), transparent 26%),
        radial-gradient(circle at 50% 42%, rgba(0, 200, 215, 0.055), transparent 32%),
        linear-gradient(180deg, rgba(2,5,10,.94), rgba(2,5,10,.99));
      z-index: -2;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,169,56,.020) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,169,56,.020) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: .30;
      z-index: -1;
      pointer-events: none;

      display: flex;
      align-items: center;

      padding: 72px 22px;
    }

    .reliquary {
      width: min(100%, 1040px);
      padding: clamp(34px, 6vw, 72px);
      border: 1px solid rgba(212, 169, 56, 0.18);
      background:
        linear-gradient(135deg, rgba(212,169,56,.045), rgba(0,0,0,.16)),
        rgba(0,0,0,.42);
      box-shadow:
        0 0 80px rgba(0,0,0,.72),
        inset 0 0 60px rgba(212,169,56,.025);
      backdrop-filter: blur(3px);
    }

    .eyebrow {
      color: var(--cyan);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 24px;
    }

    h1 {
      color: var(--white);
      font-size: clamp(42px, 8vw, 84px);
      line-height: 1.02;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 22px;
      text-shadow: 0 0 24px rgba(0,0,0,.94);

    .subtitle {
      color: var(--gold);

      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 44px;

      width: 72px;
      height: 2px;
      background: var(--gold);
      margin: 0 0 50px;
      box-shadow: 0 0 16px rgba(212,169,56,.62);
    }

    .glyph-chamber {
      position: relative;
      margin: 48px 0;
      min-height: clamp(360px, 54vw, 560px);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(212, 169, 56, 0.24);
      background:
        radial-gradient(circle at 50% 50%, rgba(212,169,56,.12), transparent 34%),
        rgba(0,0,0,.50);
      box-shadow:
        inset 0 0 72px rgba(0,0,0,.78),
        0 0 42px rgba(0,0,0,.50);
      overflow: hidden;
    }

    .glyph-chamber::before {
      content: "";
      position: absolute;
      inset: 12%;
      border: 1px solid rgba(212,169,56,.08);
      border-radius: 50%;
      box-shadow:
        0 0 38px rgba(212,169,56,.06),
        inset 0 0 38px rgba(0,200,215,.035);
      pointer-events: none;
    }

    .glyph-chamber::after {
      content: "";
      position: absolute;
      width: 72%;
      height: 72%;
      border-radius: 50%;
      background:
        radial-gradient(circle, transparent 52%, rgba(212,169,56,.045) 53%, transparent 55%),
        radial-gradient(circle, transparent 68%, rgba(0,200,215,.030) 69%, transparent 71%);
      pointer-events: none;
    }

    .glyph-link,
    .glyph-link:visited,
    .glyph-link:hover,
    .glyph-link:active {
      color: inherit;
      text-decoration: none;
    }

    .glyph-link {
      position: relative;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(220px, 36vw, 420px);
      height: clamp(220px, 36vw, 420px);
      color: rgba(212,169,56,.92);
      font-size: clamp(170px, 29vw, 360px);
      line-height: 1;
      text-shadow:
        0 0 18px rgba(212,169,56,.70),
        0 0 50px rgba(212,169,56,.25),
        0 0 90px rgba(0,200,215,.12);
      transition: transform .4s ease, color .4s ease, text-shadow .4s ease;
      cursor: default;
    }

    .glyph-link:hover {
      color: rgba(255,255,255,.96);
      transform: scale(1.018);
      text-shadow:
        0 0 22px rgba(255,255,255,.50),
        0 0 70px rgba(212,169,56,.38),
