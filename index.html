<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitPangea</title>
<meta name="description" content="A scarce digital supercontinent built on cryptographic permanence.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    align-items:center;
    justify-content:center;
    background-color:#02050a;
}

.top-nav{
    position:absolute;
    top:28px;
    right:40px;
    z-index:1000;
    display:flex;
    gap:28px;
}

.top-nav a{
    color:rgba(212,169,56,0.85);
    text-decoration:none;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    transition:all .25s ease;
}

.top-nav a:hover{
    color:#ffffff;
    text-shadow:0 0 12px rgba(212,169,56,0.6);
}

.hero-image{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

.overlay{
    position:absolute;
    bottom:24px;
    left:24px;
    color:rgba(255,255,255,0.25);
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
}

@media (max-width:768px){

    .top-nav{
        top:18px;
        right:18px;
        gap:16px;
    }

    .top-nav a{
        font-size:10px;
        letter-spacing:2px;
    }

    .overlay{
        font-size:9px;
        left:16px;
        bottom:16px;
    }
}

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 86px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 42px;
  background: rgba(0,0,0,0.76);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(212,169,56,0.14);
  z-index: 1000;
}

.brand {
  color: #ffffff;
  text-decoration: none;
  letter-spacing: 9px;
  font-size: 24px;
  font-weight: 400;
  text-transform: uppercase;
}

.brand span {
  display: block;
  margin-top: 4px;
  color: #d4a938;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.nav {
  display: flex;
  gap: 28px;
}

.nav a {
  color: rgba(212,169,56,0.9);
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
    
</style>
</head>

<body>

<header class="topbar">
  <a class="brand" href="/">
    BITPANGEA
    <span>A Digital Supercontinent</span>
  </a>

  <nav class="nav">
    <a href="/">The World</a>
    <a href="/thecharter/">The Charter</a>
    <a href="/thechronicle/">The Chronicle</a>
    <a href="/thecommons/">The Commons</a>
    <a href="/thefrontieroffice/">The Frontier Office</a>
  </nav>
</header>

<img src="./images/bitpangea.jpg" alt="BitPangea" class="hero-image">

<div class="overlay">
    Exploratory Concept
</div>

</body>
</html>
