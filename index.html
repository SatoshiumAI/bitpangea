<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitPangea</title>
<meta name="description" content="A scarce digital supercontinent built on cryptographic permanence.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    align-items:center;
    justify-content:center;
    background-color:#02050a;
}

.top-nav{
    position:absolute;
    top:28px;
    right:40px;
    z-index:1000;
    display:flex;
    gap:28px;
}

.top-nav a{
    color:rgba(212,169,56,0.85);
    text-decoration:none;
    font-size:12px;
    letter-spacing:3px;
    text-transform:uppercase;
    transition:all .25s ease;
}

.top-nav a:hover{
    color:#ffffff;
    text-shadow:0 0 12px rgba(212,169,56,0.6);
}

.hero-image{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

.overlay{
    position:absolute;
    bottom:24px;
    left:24px;
    color:rgba(255,255,255,0.25);
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
}

@media (max-width:768px){

    .top-nav{
        top:18px;
        right:18px;
        gap:16px;
    }

    .top-nav a{
        font-size:10px;
        letter-spacing:2px;
    }

    .overlay{
        font-size:9px;
        left:16px;
        bottom:16px;
    }
}
</style>
</head>

<body>

<nav class="top-nav">
    <a href="/">Home</a>
    <a href="/manifesto/index.html">Manifesto</a>
    <a href="/journal/index.html">Journal</a>
    <a href="/contact/index.html">Contact</a>
</nav>

<img src="./images/bitpangea.jpg" alt="BitPangea" class="hero-image">

<div class="overlay">
    Exploratory Concept
</div>

</body>
</html>
